name: Docs Staleness

on:
  schedule:
    - cron: "0 9 * * 1"  # Every Monday at 09:00 UTC
  push:
    paths:
      - "docs/guide/**"
      - "scripts/**"
      - "cmd/**"
      - "internal/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  staleness:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git log --since

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run staleness check
        id: staleness
        run: |
          python scripts/agents/check-staleness.py --dry-run > staleness-output.json

          if [ -s staleness-output.json ] && [ "$(cat staleness-output.json)" != "[]" ]; then
            echo "has_stale=true" >> "$GITHUB_OUTPUT"

            # Count auto-resolvable vs needs-review
            AUTO=$(python3 -c "import json; d=json.load(open('staleness-output.json')); print(sum(1 for e in d if e.get('autoResolvable')))")
            REVIEW=$(python3 -c "import json; d=json.load(open('staleness-output.json')); print(sum(1 for e in d if not e.get('autoResolvable')))")
            echo "auto_count=$AUTO" >> "$GITHUB_OUTPUT"
            echo "review_count=$REVIEW" >> "$GITHUB_OUTPUT"

            echo "Stale docs: $AUTO auto-resolvable, $REVIEW need review"
            cat staleness-output.json
          else
            echo "has_stale=false" >> "$GITHUB_OUTPUT"
            echo "auto_count=0" >> "$GITHUB_OUTPUT"
            echo "review_count=0" >> "$GITHUB_OUTPUT"
            echo "No stale docs."
          fi

      - name: Auto-bump trivial staleness
        id: autobump
        if: steps.staleness.outputs.auto_count != '0'
        run: |
          BUMPED=$(python scripts/agents/bump-validated.py --report staleness-output.json)
          echo "bumped=$BUMPED" >> "$GITHUB_OUTPUT"
          echo "Auto-bumped: $BUMPED"

      - name: Build review-only report
        id: review_report
        if: steps.staleness.outputs.has_stale == 'true'
        run: |
          python3 -c "
          import json
          d = json.load(open('staleness-output.json'))
          review = [e for e in d if not e.get('autoResolvable')]
          with open('review-report.json', 'w') as f:
            json.dump(review, f, indent=2)
          print(json.dumps(review, indent=2))
          "
          if [ -s review-report.json ] && [ "$(cat review-report.json)" != "[]" ]; then
            {
              echo 'json<<EOF'
              cat review-report.json
              echo EOF
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Regenerate AGENTS.md index
        if: steps.staleness.outputs.has_stale == 'true'
        run: python scripts/agents/build-index.py --staleness-report review-report.json

      - name: Create pull request
        if: steps.staleness.outputs.has_stale == 'true'
        continue-on-error: true
        uses: peter-evans/create-pull-request@v6
        with:
          title: "[agents] staleness report ${{ github.run_id }}"
          body: |
            Automated staleness check found docs that may need review.

            **Auto-resolved:** ${{ steps.staleness.outputs.auto_count }} doc(s) had only internal commits (`fix`, `refactor`, `test`, `ci`, `chore`, `build`, `style`, `perf`) — `lastValidated` bumped automatically.

            **Need review:** ${{ steps.staleness.outputs.review_count }} doc(s) have `feat`, `docs`, or unrecognised commits touching tracked paths.

            ${{ steps.staleness.outputs.review_count != '0' && format('```json{0}{1}{0}```', '
            ', steps.review_report.outputs.json) || 'No docs need manual review. This PR only contains auto-bumped dates — safe to merge.' }}
          branch: agents/staleness-${{ github.run_id }}
          labels: agents-staleness
          commit-message: "chore: flag stale docs in AGENTS.md"
