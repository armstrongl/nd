baseURL: https://armstrongl.github.io/nd/
title: nd

module:
  hugoVersion:
    extended: true
    min: "0.146.0"
  imports:
    - path: github.com/imfing/hextra
  mounts:
    - source: content
      target: content
    - source: ../docs/guide
      target: content/docs/guide
    - source: ../docs/reference
      target: content/docs/reference

markup:
  goldmark:
    renderer:
      unsafe: true
    renderHooks:
      link:
        useEmbedded: always
  highlight:
    noClasses: false
