baseURL: https://armstrongl.github.io/nd/
title: nd
enableRobotsTXT: true

module:
  hugoVersion:
    extended: true
    min: "0.146.0"
  imports:
    - path: github.com/imfing/hextra
  mounts:
    - source: content
      target: content
    - source: ../docs/guide
      target: content/docs/guide
    - source: ../docs/reference
      target: content/docs/reference

markup:
  goldmark:
    renderer:
      unsafe: true
    renderHooks:
      link:
        useEmbedded: always
  highlight:
    noClasses: false

menu:
  main:
    - name: Documentation
      pageRef: /docs
      weight: 1
    - name: About
      pageRef: /docs/about
      weight: 2
    - name: GitHub
      url: https://github.com/armstrongl/nd
      weight: 3
    - name: Search
      weight: 4
      params:
        type: search

  sidebar:
    - name: More
      params:
        type: separator
      weight: 1
    - name: "GitHub ↗"
      url: https://github.com/armstrongl/nd
      weight: 2
    - name: "Go Docs ↗"
      url: https://pkg.go.dev/github.com/armstrongl/nd
      weight: 3

outputs:
  home:
    - html
    - llms
    - rss
  section:
    - html
    - rss
  page:
    - html
    - markdown

params:
  description: "nd is a CLI tool for managing and deploying AI coding agent assets (skills, rules, context, commands, hooks, output styles, agents, and plugins) across tools like Claude Code."
  navbar:
    displayTitle: true
    displayLogo: false
  footer:
    displayPoweredBy: false
  page:
    contextMenu:
      enable: true
