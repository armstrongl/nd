[global]
exclude = [
  ".git",
  "vendor",
  "__pycache__",
  ".venv",
  "dist",
  "build",
  "bin",
  "node_modules",
]

[per-file-ignores]
"CHANGELOG.md" = ["MD024"]

[MD003]
style = "atx"

[MD004]
style = "dash"

[MD007]
indent = 2

[MD013]
line-length = 120
code-blocks = false
tables = false
headings = false

[MD029]
style = "ordered"

[MD044]
names = ["Go", "Python", "GitHub"]

[MD046]
style = "fenced"

[MD048]
style = "backtick"
